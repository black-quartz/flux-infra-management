apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: envoy-gateway-system
spec:
  issuerRef:
    name: vault-gateway-issuer
    kind: ClusterIssuer
  secretName: vault-tls-secret
  commonName: vault.blackquartz.io
  dnsNames:
    - vault.blackquartz.io
  usages:
    - server auth
    - client auth
