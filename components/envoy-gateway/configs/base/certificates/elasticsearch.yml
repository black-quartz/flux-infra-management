apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: elasticsearch-tls
  namespace: envoy-gateway-system
spec:
  issuerRef:
    name: vault-gateway-issuer
    kind: ClusterIssuer
  secretName: elasticsearch-tls-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  commonName: elasticsearch.ilysium.io
  dnsNames:
    - elasticsearch.ilysium.io
  usages:
    - server auth
    - client auth
