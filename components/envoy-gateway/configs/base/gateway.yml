apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: envoy-gateway-system
spec:
  gatewayClassName: cluster-gateway
  listeners:
    - name: vault-https
      protocol: HTTPS
      port: 443
      hostname: vault.blackquartz.io
      tls:
        certificateRefs:
          - kind: Secret
            group: ""
            name: vault-tls-secret
      allowedRoutes:
        namespaces:
          selector:
            matchLabels:
              kubernetes.io/metadata.name: vault
    - name: elastic-https
      protocol: HTTPS
      port: 443
      hostname: elastic.blackquartz.io
      tls:
        certificateRefs:
          - kind: Secret
            group: ""
            name: elastic-tls-secret
      allowedRoutes:
        namespaces:
          selector:
            matchLabels:
              kubernetes.io/metadata.name: elastic-stack
