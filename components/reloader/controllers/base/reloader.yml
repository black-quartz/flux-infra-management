apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: stakater
  namespace: reloader
spec:
  interval: 5m
  url: https://stakater.github.io/stakater-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  serviceAccountName: flux
  targetNamespace: reloader
  interval: 30m
  chart:
    spec:
      chart: reloader
      version: "2.2.x"
      sourceRef:
        kind: HelmRepository
        name: stakater
      interval: 12h
  releaseName: reloader
  # https://github.com/stakater/Reloader/blob/master/deployments/kubernetes/chart/reloader/values.yaml
  # values:
