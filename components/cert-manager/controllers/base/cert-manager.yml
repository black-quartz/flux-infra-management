apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
  namespace: cert-manager
spec:
  type: "oci"
  interval: 5m
  url: oci://quay.io/jetstack/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  serviceAccountName: flux
  targetNamespace: cert-manager
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: "1.20.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 12h
  releaseName: cert-manager
  # https://github.com/cert-manager/cert-manager/blob/master/deploy/charts/cert-manager/values.yaml
  values:
    global:
      logLevel: 3
    crds:
      enabled: true
      keep: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
spec:
  dependsOn:
    - name: cert-manager
  serviceAccountName: flux
  targetNamespace: cert-manager
  interval: 30m
  chart:
    spec:
      chart: trust-manager
      version: "0.22.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 12h
  releaseName: trust-manager
  # https://github.com/cert-manager/trust-manager/blob/main/deploy/charts/trust-manager/values.yaml
  values:
    app:
      logFormat: json
      logLevel: 3
