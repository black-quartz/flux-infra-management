apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-gateway-issuer
spec:
  vault:
    path: pki/sign/gateway
    server: http://vault.vault.svc.${CLUSTER_DOMAIN}:8200
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-managerß
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-kubernetes-issuer
spec:
  vault:
    path: pki/sign/kubernetes
    server: http://vault.vault.svc.${CLUSTER_DOMAIN}:8200
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-managerß
